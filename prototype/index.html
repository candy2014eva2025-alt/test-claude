<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CoinPal – Balance</title>
<style>
/* ── Reset & Base ─────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
  background: #f0ebe4;
  color: #1a1a2e;
  display: flex;
  min-height: 100vh;
}

/* ── Sidebar ──────────────────────────────────────────────────────────────── */
.sidebar {
  width: 240px;
  min-height: 100vh;
  background: #f0ebe4;
  padding: 20px 16px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
}

/* Logo */
.sidebar-logo {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px 18px;
}
.logo-mark {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, #2ec4b6, #1a8a80);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-weight: 800; font-size: 15px;
}
.logo-name {
  font-size: 20px; font-weight: 800;
  background: linear-gradient(135deg, #2ec4b6, #1a6b5a);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}

/* Management button (top) */
.nav-management {
  display: flex; align-items: center; justify-content: space-between;
  padding: 11px 16px;
  border-radius: 12px;
  border: 1.5px solid #d8d0c8;
  background: transparent;
  cursor: pointer;
  font-size: 14px; font-weight: 500; color: #5a5467;
  transition: background .15s, border-color .15s;
  margin-bottom: 4px;
}
.nav-management:hover { background: #fff; border-color: #b8b0a8; }
.nav-management svg { opacity: .5; }

/* Section label */
.nav-section-label {
  font-size: 11px; font-weight: 700; letter-spacing: 1px;
  color: #9e968e; text-transform: uppercase;
  padding: 8px 8px 4px;
}

/* Nav item base */
.nav-item {
  display: flex; align-items: center;
  padding: 12px 16px;
  border-radius: 12px;
  cursor: pointer;
  font-size: 14px; font-weight: 600;
  transition: background .15s, transform .1s;
  user-select: none;
  gap: 10px;
  text-decoration: none;
}
.nav-item:hover { transform: translateX(2px); }

/* Green (Business) items */
.nav-item--green {
  background: #cef0e8;
  color: #1a6b5a;
}
.nav-item--green:hover { background: #b8ead e; }
.nav-item--green.active {
  background: #b2e8db;
  color: #145a4a;
  box-shadow: 0 2px 8px rgba(46,196,182,.2);
}

/* Purple (Product) group */
.nav-item--purple {
  background: #e2dcf8;
  color: #3d3580;
}
.nav-item--purple:hover { background: #d8d0f5; }
.nav-item--purple .nav-arrow {
  margin-left: auto;
  transition: transform .25s;
  opacity: .6;
}
.nav-item--purple.open .nav-arrow { transform: rotate(180deg); }

/* Sub-items */
.nav-subitems {
  display: flex; flex-direction: column; gap: 4px;
  padding-left: 14px;
  overflow: hidden;
  max-height: 0;
  transition: max-height .3s ease;
}
.nav-subitems.open { max-height: 300px; }

.nav-subitem {
  display: flex; align-items: center;
  padding: 10px 14px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 13px; font-weight: 500;
  color: #4a3fa0;
  background: #ede9fb;
  transition: background .15s, transform .1s;
  gap: 8px;
}
.nav-subitem:hover { background: #e2dcf8; transform: translateX(2px); }
.nav-subitem.active { background: #d8d0f5; color: #2d2575; }

/* Bottom items */
.sidebar-bottom {
  margin-top: auto;
  display: flex; flex-direction: column; gap: 6px;
  padding-top: 16px;
  border-top: 1px solid #ddd5cb;
}

.nav-item--ghost {
  background: transparent; color: #7a7080; font-weight: 500;
}
.nav-item--ghost:hover { background: #e8e0d8; }

/* ── Main Content ─────────────────────────────────────────────────────────── */
.main {
  flex: 1;
  display: flex; flex-direction: column;
  overflow: hidden;
}

/* Top bar */
.topbar {
  height: 56px;
  background: #fff;
  border-bottom: 1px solid #eae4dc;
  display: flex; align-items: center; justify-content: flex-end;
  padding: 0 28px;
  gap: 16px;
  flex-shrink: 0;
}

.topbar-btn {
  width: 34px; height: 34px; border-radius: 8px;
  border: 1px solid #e8e0d8; background: transparent;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: #7a7080; transition: background .15s, color .15s;
}
.topbar-btn:hover { background: #f0ebe4; color: #1a1a2e; }
.topbar-btn.has-dot { position: relative; }
.topbar-btn.has-dot::after {
  content: ''; position: absolute; top: 6px; right: 6px;
  width: 7px; height: 7px; border-radius: 50%;
  background: #ff6b6b; border: 1.5px solid #fff;
}

.topbar-lang {
  display: flex; align-items: center; gap: 5px;
  font-size: 13px; color: #5a5467; cursor: pointer;
  padding: 6px 10px; border-radius: 8px;
  border: 1px solid #e8e0d8;
  transition: background .15s;
}
.topbar-lang:hover { background: #f0ebe4; }

.topbar-user {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; color: #3a3450; font-weight: 500;
  cursor: pointer; padding: 6px 10px; border-radius: 8px;
  transition: background .15s;
}
.topbar-user:hover { background: #f0ebe4; }
.user-avatar {
  width: 30px; height: 30px; border-radius: 50%;
  background: linear-gradient(135deg, #cef0e8, #84d8c8);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: #1a6b5a;
}

/* ── Page Body ────────────────────────────────────────────────────────────── */
.page-body {
  flex: 1; overflow-y: auto;
  padding: 28px 32px;
  background: #f7f4f0;
}

/* ── Total Banner ─────────────────────────────────────────────────────────── */
.total-banner {
  background: #fff;
  border-radius: 16px;
  padding: 28px 32px;
  margin-bottom: 20px;
  box-shadow: 0 1px 4px rgba(0,0,0,.05);
  display: flex;
  align-items: stretch;
  justify-content: space-between;
  gap: 24px;
}

.banner-left { flex: 1; }

.banner-label {
  font-size: 11px; font-weight: 700; letter-spacing: .8px;
  color: #9e968e; text-transform: uppercase; margin-bottom: 12px;
}

.banner-amount-row {
  display: flex; align-items: center; gap: 12px; margin-bottom: 10px;
}

.banner-amount {
  font-size: 40px; font-weight: 800; color: #1a1a2e;
  letter-spacing: -1px; font-variant-numeric: tabular-nums;
}

.currency-pill {
  display: flex; align-items: center; gap: 5px;
  background: #f0ebe4; border-radius: 20px;
  padding: 6px 12px; cursor: pointer;
  font-size: 13px; font-weight: 600; color: #5a5467;
  border: 1.5px solid #ddd5cb;
  transition: background .15s;
}
.currency-pill:hover { background: #e8e0d8; }
.currency-pill svg { opacity: .6; }

.banner-sub {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; color: #9e968e;
}
.banner-sub b { color: #3a3450; }

.refresh-icon-btn {
  width: 26px; height: 26px; border-radius: 6px;
  background: transparent; border: 1px solid #ddd5cb;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: #9e968e; transition: background .15s, color .15s;
}
.refresh-icon-btn:hover { background: #cef0e8; color: #1a6b5a; }

/* Stat pills */
.banner-stats {
  display: flex; flex-direction: column;
  gap: 10px; justify-content: center; min-width: 200px;
}

.stat-pill {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px; border-radius: 10px; gap: 20px;
}
.stat-pill--green  { background: #e8f8f4; }
.stat-pill--orange { background: #fef6ec; }
.stat-pill--blue   { background: #eef5ff; }

.stat-pill__label {
  font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .5px; color: #7a7480;
}
.stat-pill__val {
  font-size: 13px; font-weight: 700; font-variant-numeric: tabular-nums;
}
.stat-pill--green  .stat-pill__val { color: #1a9a7a; }
.stat-pill--orange .stat-pill__val { color: #d48010; }
.stat-pill--blue   .stat-pill__val { color: #2060d0; }

/* ── Balances Section ─────────────────────────────────────────────────────── */
.balances-section {
  background: #fff;
  border-radius: 16px;
  padding: 24px;
  box-shadow: 0 1px 4px rgba(0,0,0,.05);
}

.section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px; gap: 12px; flex-wrap: wrap;
}

.section-title {
  font-size: 17px; font-weight: 700; color: #1a1a2e;
}

.toolbar {
  display: flex; align-items: center; gap: 10px;
}

.search-box {
  display: flex; align-items: center; gap: 8px;
  border: 1.5px solid #e8e0d8; border-radius: 10px;
  padding: 7px 12px; background: #faf7f4;
  transition: border-color .15s;
}
.search-box:focus-within { border-color: #2ec4b6; background: #fff; }
.search-box input {
  border: none; background: transparent; outline: none;
  font-size: 13px; color: #3a3450; width: 160px;
}
.search-box input::placeholder { color: #c0b8b0; }
.search-box svg { color: #b0a8a0; flex-shrink: 0; }

.hide-zero-label {
  display: flex; align-items: center; gap: 7px;
  font-size: 13px; color: #7a7480; cursor: pointer; user-select: none;
}
.hide-zero-label input { accent-color: #2ec4b6; width: 15px; height: 15px; }

.export-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 14px; border-radius: 10px;
  border: 1.5px solid #e8e0d8; background: transparent;
  font-size: 13px; font-weight: 500; color: #5a5467;
  cursor: pointer; transition: background .15s, border-color .15s;
}
.export-btn:hover { background: #f0ebe4; border-color: #c8c0b8; }

/* ── Balance Card ─────────────────────────────────────────────────────────── */
.balance-card {
  display: flex; align-items: center;
  padding: 16px 20px;
  border-radius: 12px;
  border: 1.5px solid #ede8e2;
  margin-bottom: 10px;
  background: #faf8f5;
  gap: 20px;
  transition: border-color .2s, box-shadow .2s, background .2s;
}
.balance-card:last-child { margin-bottom: 0; }

.balance-card:hover {
  border-color: #2ec4b6;
  box-shadow: 0 2px 14px rgba(46,196,182,.12);
  background: #fff;
}

/* Icon */
.card-icon-wrap {
  width: 46px; height: 46px; border-radius: 50%;
  overflow: hidden; flex-shrink: 0;
  background: #f0ebe4;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 800; color: #7a7080;
}
.card-icon-wrap img { width: 46px; height: 46px; object-fit: contain; }

/* Main info */
.card-main { flex: 0 0 200px; min-width: 0; }
.card-main-top {
  display: flex; align-items: baseline; gap: 5px;
  flex-wrap: wrap; margin-bottom: 3px;
}
.card-amount { font-size: 18px; font-weight: 800; color: #1a1a2e; font-variant-numeric: tabular-nums; }
.card-currency { font-size: 13px; font-weight: 600; color: #7a7080; }
.card-network {
  font-size: 10px; font-weight: 600; color: #9090b0;
  background: #f0edf8; border-radius: 4px; padding: 1px 5px;
  border: 1px solid #e0daf0;
}
.card-usd { font-size: 12px; color: #b0a8a0; }

/* Breakdown */
.card-breakdown {
  flex: 1; display: flex; align-items: center;
  justify-content: center; gap: 0;
}
.breakdown-item {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 0 24px;
}
.bd-divider { width: 1px; height: 34px; background: #ede8e2; }
.bd-label {
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: .5px; color: #b0a8a0;
}
.bd-val { font-size: 13px; font-weight: 700; font-variant-numeric: tabular-nums; }
.bd-val--avail   { color: #1a9a7a; }
.bd-val--frozen  { color: #d48010; }
.bd-val--pending { color: #2060d0; }

/* Actions */
.card-actions {
  display: flex; align-items: center; gap: 8px; flex-shrink: 0;
}

.action-btn {
  display: flex; align-items: center; gap: 5px;
  padding: 7px 13px; border-radius: 9px;
  font-size: 12px; font-weight: 600; cursor: pointer;
  border: 1.5px solid transparent;
  transition: background .15s, border-color .15s, transform .1s;
}
.action-btn:hover { transform: translateY(-1px); }

.action-btn--payout {
  background: #e8f8f4; color: #1a7a6a;
  border-color: #c0ede3;
}
.action-btn--payout:hover { background: #cef0e8; border-color: #2ec4b6; }

.action-btn--withdraw {
  background: #fef6ec; color: #b86010;
  border-color: #fce0b8;
}
.action-btn--withdraw:hover { background: #fdecd8; border-color: #e69040; }

.action-btn--history {
  background: #f0ebe4; color: #5a5467;
  border-color: #ddd5cb;
}
.action-btn--history:hover { background: #e8e0d8; border-color: #c0b8b0; }

/* ── Skeleton ──────────────────────────────────────────────────────────────── */
@keyframes shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
.skeleton {
  background: linear-gradient(90deg, #ede8e2 25%, #e4dfd8 50%, #ede8e2 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
  border-radius: 8px;
}
.balance-card--skeleton { pointer-events: none; gap: 14px; }
.sk-circle { width: 46px; height: 46px; border-radius: 50%; flex-shrink: 0; }
.sk-lines { display: flex; flex-direction: column; gap: 8px; flex: 1; }
.sk-line { height: 14px; }
.sk-wide { width: 45%; }
.sk-narrow { width: 22%; }

/* ── Responsive ───────────────────────────────────────────────────────────── */
@media (max-width: 960px) {
  .sidebar { width: 200px; }
  .balance-card { flex-wrap: wrap; gap: 14px; }
  .card-main { flex: 0 0 100%; }
  .card-breakdown { justify-content: flex-start; }
  .breakdown-item:first-child { padding-left: 0; }
}
@media (max-width: 700px) {
  .sidebar { display: none; }
  .page-body { padding: 16px; }
  .total-banner { flex-direction: column; }
  .banner-stats { flex-direction: row; flex-wrap: wrap; }
  .stat-pill { flex: 1; min-width: 130px; }
  .card-breakdown { flex-wrap: wrap; }
  .bd-divider { display: none; }
  .breakdown-item { padding: 0; align-items: flex-start; }
}
</style>
</head>

          Your total balance estimate in
          <b id="curr-sub">USDT</b>
          at <span id="refresh-time"></span>
          <button class="refresh-icon-btn" onclick="refreshAll()" title="Refresh">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          </button>
        </div>
      </div>

      <div class="banner-stats">
        <div class="stat-pill stat-pill--green">
          <span class="stat-pill__label">Available</span>
          <span class="stat-pill__val">0.000000 USDT</span>
        </div>
        <div class="stat-pill stat-pill--orange">
          <span class="stat-pill__label">Frozen</span>
          <span class="stat-pill__val">0.000000 USDT</span>
        </div>
        <div class="stat-pill stat-pill--blue">
          <span class="stat-pill__label">Pending</span>
          <span class="stat-pill__val">0.000000 USDT</span>
        </div>
      </div>
    </div>

    <!-- Balances Section -->
    <div class="balances-section">
      <div class="section-header">
        <h2 class="section-title">Balances</h2>
        <div class="toolbar">
          <div class="search-box">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" placeholder="Search currency..." oninput="filterCards(this.value)" />
          </div>
          <label class="hide-zero-label">
            <input type="checkbox" id="hide-zero" onchange="filterCards()" />
            Hide zero balance
          </label>
          <button class="export-btn">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Export
          </button>
        </div>
      </div>

      <div id="cards-container">
        <!-- Skeleton -->
        <div class="balance-card balance-card--skeleton">
          <div class="skeleton sk-circle"></div>
          <div class="sk-lines"><div class="skeleton sk-line sk-wide"></div><div class="skeleton sk-line sk-narrow"></div></div>
        </div>
        <div class="balance-card balance-card--skeleton">
          <div class="skeleton sk-circle"></div>
          <div class="sk-lines"><div class="skeleton sk-line sk-wide"></div><div class="skeleton sk-line sk-narrow"></div></div>
        </div>
        <div class="balance-card balance-card--skeleton">
          <div class="skeleton sk-circle"></div>
          <div class="sk-lines"><div class="skeleton sk-line sk-wide"></div><div class="skeleton sk-line sk-narrow"></div></div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
// ── Data ──────────────────────────────────────────────────────────────────────
const BALANCES = [
  { currency:'USD',  fullName:'US Dollar',    icon:'https://flagcdn.com/w40/us.png',
    total:0, available:0, frozen:0, pending:0, usdValue:0, network:null },
  { currency:'USDC', fullName:'USD Coin',      icon:'https://cryptologos.cc/logos/usd-coin-usdc-logo.png',
    total:0, available:0, frozen:0, pending:0, usdValue:0, network:'ERC-20' },
  { currency:'USDT', fullName:'Tether USD',    icon:'https://cryptologos.cc/logos/tether-usdt-logo.png',
    total:0, available:0, frozen:0, pending:0, usdValue:0, network:'TRC-20' },
  { currency:'BTC',  fullName:'Bitcoin',       icon:'https://cryptologos.cc/logos/bitcoin-btc-logo.png',
    total:0, available:0, frozen:0, pending:0, usdValue:0, network:null },
  { currency:'ETH',  fullName:'Ethereum',      icon:'https://cryptologos.cc/logos/ethereum-eth-logo.png',
    total:0, available:0, frozen:0, pending:0, usdValue:0, network:'ERC-20' },
]

const CURRENCIES = ['USDT','USD','EUR','BTC','ETH']
let currIndex = 0
let hideZero = false
let searchKw = ''

// ── Helpers ───────────────────────────────────────────────────────────────────
function fmt6(v){ return Number(v||0).toFixed(6) }
function fmtUSD(v){ return Number(v||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}) }
function now(){
  const d=new Date(), p=n=>String(n).padStart(2,'0')
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`
}
function initials(s){ return s.slice(0,2).toUpperCase() }

// ── Sidebar ───────────────────────────────────────────────────────────────────
function toggleProduct(){
  const btn=document.getElementById('product-toggle')
  const sub=document.getElementById('product-subitems')
  btn.classList.toggle('open')
  sub.classList.toggle('open')
}

function setPage(p){
  document.querySelectorAll('.nav-item,.nav-subitem').forEach(el=>el.classList.remove('active'))
  event.currentTarget.classList.add('active')
  event.preventDefault()
}

// ── Currency cycle ─────────────────────────────────────────────────────────────
function cycleCurrency(){
  currIndex = (currIndex+1) % CURRENCIES.length
  const c = CURRENCIES[currIndex]
  document.getElementById('curr-label').textContent = c
  document.getElementById('curr-sub').textContent   = c
}

// ── Filter ────────────────────────────────────────────────────────────────────
function filterCards(kw){
  if(kw !== undefined) searchKw = kw.toLowerCase()
  hideZero = document.getElementById('hide-zero').checked
  renderCards()
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderCards(){
  const container = document.getElementById('cards-container')
  let list = BALANCES
  if(hideZero) list = list.filter(b => b.total > 0)
  if(searchKw) list = list.filter(b =>
    b.currency.toLowerCase().includes(searchKw) ||
    b.fullName.toLowerCase().includes(searchKw)
  )

  if(list.length === 0){
    container.innerHTML = `
      <div style="text-align:center;padding:60px 0;color:#b0a8a0">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" style="opacity:.4;margin-bottom:12px;display:block;margin-inline:auto"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <div style="font-size:14px">No balances found</div>
      </div>`
    return
  }

  container.innerHTML = list.map(b => `
    <div class="balance-card" data-currency="${b.currency}">
      <div class="card-icon-wrap" id="icon-${b.currency}">
        <img src="${b.icon}" alt="${b.currency}"
          onerror="this.style.display='none';this.parentElement.textContent='${initials(b.currency)}'"
        />
      </div>

      <div class="card-main">
        <div class="card-main-top">
          <span class="card-amount">${fmt6(b.total)}</span>
          <span class="card-currency">${b.currency}</span>
          ${b.network ? `<span class="card-network">${b.network}</span>` : ''}
        </div>
        <div class="card-usd">≈ $ ${fmtUSD(b.usdValue)}</div>
      </div>

      <div class="card-breakdown">
        <div class="breakdown-item">
          <span class="bd-label">Available</span>
          <span class="bd-val bd-val--avail">${fmt6(b.available)}</span>
        </div>
        <div class="bd-divider"></div>
        <div class="breakdown-item">
          <span class="bd-label">Frozen</span>
          <span class="bd-val bd-val--frozen">${fmt6(b.frozen)}</span>
        </div>
        <div class="bd-divider"></div>
        <div class="breakdown-item">
          <span class="bd-label">Pending</span>
          <span class="bd-val bd-val--pending">${fmt6(b.pending)}</span>
        </div>
      </div>

      <div class="card-actions">
        <button class="action-btn action-btn--payout" onclick="goTo('payout','${b.currency}')">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>
          Payout
        </button>
        <button class="action-btn action-btn--withdraw" onclick="goTo('withdraw','${b.currency}')">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          Withdraw
        </button>
        <button class="action-btn action-btn--history" onclick="goTo('history','${b.currency}')">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          History
        </button>
      </div>
    </div>
  `).join('')
}

function goTo(action, currency){
  alert(`Navigate to: /${action}?currency=${currency}`)
}

// ── Init ──────────────────────────────────────────────────────────────────────
function refreshAll(){
  document.getElementById('refresh-time').textContent = now()
}

function init(){
  document.getElementById('refresh-time').textContent = now()
  // Simulate load delay
  setTimeout(() => { renderCards() }, 600)
}

init()
</script>
</body>
</html>
